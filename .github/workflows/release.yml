name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --release --locked
        timeout-minutes: 15

  build:
    needs: test
    strategy:
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: x64
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            suffix: aarch64
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Rename binary
        shell: pwsh
        run: |
          $repo = "${{ github.event.repository.name }}"
          $version = "${{ github.ref_name }}"
          Copy-Item "target/${{ matrix.target }}/release/$repo.exe" "$repo-$version-${{ matrix.suffix }}.exe"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.suffix }}
          path: ${{ github.event.repository.name }}-*-${{ matrix.suffix }}.exe
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # keyless cosign signing via Sigstore OIDC
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum * > SHA256SUMS
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign binaries + checksums (keyless / Sigstore)
        working-directory: dist
        run: |
          for f in *.exe SHA256SUMS; do
            cosign sign-blob --yes "$f" \
              --output-signature "$f.sig" \
              --output-certificate "$f.pem"
          done
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.exe
            dist/SHA256SUMS
            dist/*.sig
            dist/*.pem
          draft: true
          prerelease: false
          fail_on_unmatched_files: true
