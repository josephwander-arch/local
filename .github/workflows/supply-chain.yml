name: Supply Chain

# Software-composition analysis:
#  - cargo audit: RustSec advisories (vulnerabilities / unmaintained / unsound / yanked)
#  - cargo deny:  license compliance, dependency bans, source allow-listing
# Advisories are owned by the audit job; deny covers licenses/bans/sources to avoid overlap.

on:
  push:
    branches: [main]
    paths: ["**/Cargo.toml", "**/Cargo.lock", "deny.toml", ".github/workflows/supply-chain.yml"]
  pull_request:
    paths: ["**/Cargo.toml", "**/Cargo.lock", "deny.toml", ".github/workflows/supply-chain.yml"]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: command -v cargo-audit || cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo deny check
        run: cargo deny check licenses bans sources
