name: Supply Chain

# Software-composition analysis: scans Cargo.lock against the RustSec
# advisory database for known-vulnerable / unmaintained dependencies.
# Runs on every push to main, every PR, and weekly (catches newly
# disclosed advisories in already-pinned deps without a code change).

on:
  push:
    branches: [main]
    paths: ["**/Cargo.toml", "**/Cargo.lock", ".github/workflows/supply-chain.yml"]
  pull_request:
    paths: ["**/Cargo.toml", "**/Cargo.lock", ".github/workflows/supply-chain.yml"]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-bin-v1
      - name: Install cargo-audit
        run: command -v cargo-audit || cargo install cargo-audit --locked
      # Exits non-zero on actual vulnerabilities (the CI gate). Unmaintained /
      # yanked notices are advisory only and do NOT fail the build by default —
      # review them in the run log and address via Dependabot.
      - name: cargo audit
        run: cargo audit
