[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
unmaintained = "none"

[licenses]
version = 2
private = { ignore = true }
allow = [
  "MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause", "BSD-3-Clause", "ISC", "Zlib",
  "Unicode-DFS-2016", "Unicode-3.0", "MPL-2.0", "CC0-1.0",
  "BSL-1.0", "0BSD", "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
